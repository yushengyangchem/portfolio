name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync repository to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "${GITEE_USERNAME}" ] || [ -z "${GITEE_TOKEN}" ]; then
            echo "Missing secrets: GITEE_USERNAME or GITEE_TOKEN"
            exit 1
          fi

          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/${GITHUB_REPO}.git"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git remote get-url gitee >/dev/null 2>&1; then
            git remote set-url gitee "${GITEE_URL}"
          else
            git remote add gitee "${GITEE_URL}"
          fi

          # Sync code branches and tags.
          git push gitee --all --force
          git push gitee --tags --force
